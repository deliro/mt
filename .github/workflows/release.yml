name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Leave empty to use the triggering tag."
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: mt
            archive_ext: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: mt
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mt
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mt.exe
            archive_ext: zip
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libudev-dev libdbus-1-dev \
            libxkbcommon-dev libwayland-dev \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev \
            libfontconfig1-dev

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "dist/${{ matrix.artifact }}"

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar -czf "mt-${{ matrix.target }}.tar.gz" "${{ matrix.artifact }}"

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\${{ matrix.artifact }}" -DestinationPath "dist\mt-${{ matrix.target }}.zip"

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: mt-${{ matrix.target }}
          path: dist/mt-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

      # winget prefers a raw portable .exe over a zip-with-nested-exe.
      # Publish it alongside the zip for the windows target.
      - name: Stage windows portable exe
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "dist/mt-${{ matrix.target }}.exe"

      - name: Upload windows portable exe
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v7
        with:
          name: mt-${{ matrix.target }}-exe
          path: dist/mt-${{ matrix.target }}.exe
          if-no-files-found: error

  linux-appimage:
    name: linux appimage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: mt-x86_64-unknown-linux-gnu
          path: incoming
      - name: Install fuse for AppImage runtime
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libfuse2 imagemagick
      - name: Build AppImage
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf incoming/mt-x86_64-unknown-linux-gnu.tar.gz -C incoming
          mkdir -p AppDir/usr/bin
          install -m755 incoming/mt AppDir/usr/bin/mt
          cat > AppDir/mt.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Meshtastic
          Comment=Native desktop client for Meshtastic radios (BLE / Serial / TCP)
          Exec=mt
          Icon=mt
          Categories=Network;HamRadio;
          Terminal=false
          EOF
          # 256x256 transparent PNG placeholder. Drop an `assets/icon.png`
          # into the repo and we'll prefer that.
          if [ -f assets/icon.png ]; then
            cp assets/icon.png AppDir/mt.png
          else
            convert -size 256x256 xc:transparent AppDir/mt.png
          fi
          curl -fsSL -o linuxdeploy.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy.AppImage
          ./linuxdeploy.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/mt.desktop \
            --icon-file AppDir/mt.png \
            --output appimage
          # linuxdeploy names the file `<Name>-<arch>.AppImage` from the
          # desktop entry; rename to a stable artifact name regardless.
          built=$(find . -maxdepth 1 -type f -name "*.AppImage" ! -name "linuxdeploy*" -print -quit)
          [ -n "$built" ] || { echo "AppImage not produced" >&2; ls -la; exit 1; }
          mkdir -p dist
          mv "$built" "dist/mt-x86_64.AppImage"
      - uses: actions/upload-artifact@v7
        with:
          name: mt-x86_64.AppImage
          path: dist/mt-x86_64.AppImage
          if-no-files-found: error

  macos-universal:
    name: macos universal
    runs-on: macos-14
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: mt-aarch64-apple-darwin
          path: arm
      - uses: actions/download-artifact@v8
        with:
          name: mt-x86_64-apple-darwin
          path: intel
      - name: Combine with lipo
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist combined
          tar -xzf arm/mt-aarch64-apple-darwin.tar.gz -C combined
          mv combined/mt combined/mt-arm
          tar -xzf intel/mt-x86_64-apple-darwin.tar.gz -C combined
          mv combined/mt combined/mt-intel
          lipo -create combined/mt-arm combined/mt-intel -output combined/mt
          tar -czf dist/mt-macos-universal.tar.gz -C combined mt
      - uses: actions/upload-artifact@v7
        with:
          name: mt-macos-universal
          path: dist/mt-macos-universal.tar.gz
          if-no-files-found: error

  publish:
    name: publish to release
    runs-on: ubuntu-latest
    needs: [build, linux-appimage, macos-universal]
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Attach archives to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # On push:tags the ref is `refs/tags/vX.Y.Z` so GITHUB_REF_NAME holds
          # the tag. On workflow_dispatch we receive the tag through `inputs.tag`.
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "Uploading to release $TAG"
          cd artifacts
          ls -la
          # All archives at the top level after merge-multiple.
          for f in *.tar.gz *.zip *.AppImage *.exe; do
            [ -e "$f" ] || continue
            gh release upload "$TAG" "$f" --clobber
          done

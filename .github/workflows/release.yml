name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Leave empty to use the triggering tag."
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: mt
            archive_ext: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: mt
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mt
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mt.exe
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libudev-dev libdbus-1-dev \
            libxkbcommon-dev libwayland-dev \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev \
            libfontconfig1-dev

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "dist/${{ matrix.artifact }}"

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          cd dist
          tar -czf "mt-${{ matrix.target }}.tar.gz" "${{ matrix.artifact }}"

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\${{ matrix.artifact }}" -DestinationPath "dist\mt-${{ matrix.target }}.zip"

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: mt-${{ matrix.target }}
          path: dist/mt-${{ matrix.target }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  macos-universal:
    name: macos universal
    runs-on: macos-14
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: mt-aarch64-apple-darwin
          path: arm
      - uses: actions/download-artifact@v8
        with:
          name: mt-x86_64-apple-darwin
          path: intel
      - name: Combine with lipo
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist combined
          tar -xzf arm/mt-aarch64-apple-darwin.tar.gz -C combined
          mv combined/mt combined/mt-arm
          tar -xzf intel/mt-x86_64-apple-darwin.tar.gz -C combined
          mv combined/mt combined/mt-intel
          lipo -create combined/mt-arm combined/mt-intel -output combined/mt
          tar -czf dist/mt-macos-universal.tar.gz -C combined mt
      - uses: actions/upload-artifact@v7
        with:
          name: mt-macos-universal
          path: dist/mt-macos-universal.tar.gz
          if-no-files-found: error

  publish:
    name: publish to release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [build, macos-universal]
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Attach archives to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "Uploading to release $TAG"
          cd artifacts
          ls -la
          # All archives at the top level after merge-multiple.
          for f in *.tar.gz *.zip; do
            [ -e "$f" ] || continue
            gh release upload "$TAG" "$f" --clobber
          done
